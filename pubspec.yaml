# Archivo: pubspec.yaml
name: botslode
description: "The ultimate bot factory platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  connectivity_plus: ^7.0.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_colorpicker: ^1.1.0
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_riverpod: ^2.5.1
  font_awesome_flutter: ^10.12.0
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  json_annotation: ^4.8.1
  lottie: ^3.1.0
  mask_text_input_formatter: ^2.9.0
  rive: ^0.13.4
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.5.0
  uuid: ^4.3.3
  window_manager: ^0.3.8

dev_dependencies:
  build_runner: ^2.4.9
  custom_lint: ^0.6.4
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/icon/botlode_logo.png"
  min_sdk_android: 21 # opcional
  web:
    generate: true
    image_path: "assets/icon/botlode_logo.png"
    background_color: "#050505" # Tu color de fondo negro
    theme_color: "#FFFFC000" # Tu color primario (Amarillo/Dorado)
  windows:
    generate: true
    icon_size: 48
    image_path: "assets/icon/botlode_logo.png"
  macos:
    generate: true
    image_path: "assets/icon/botlode_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/icon/
    - .env

  # Configuración para Variable Font (Un solo archivo para gobernarlos a todos)
  fonts:
    - family: Oxanium
      fonts:
        - asset: assets/fonts/Oxanium-VariableFont_wght.ttf
          # Al no definir 'weight', Flutter usará los ejes variables del archivo
          # para generar Bold, Light, etc. automáticamente.
